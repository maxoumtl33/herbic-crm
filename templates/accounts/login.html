{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Herbic CRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>
<body style="background:none;display:block;">
    <div class="login-page">
        <div class="login-card">
            <div class="text-center mb-4">
                <div class="login-logo mb-2"><i class="bi bi-flower1"></i> Herbic CRM</div>
                <p style="color:var(--text-muted);font-size:0.9rem;">Connectez-vous pour continuer</p>
            </div>
            {% if form.errors %}
            <div class="alert alert-danger py-2">
                <i class="bi bi-exclamation-circle me-1"></i> Identifiants incorrects.
            </div>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Nom d'utilisateur</label>
                    {{ form.username }}
                </div>
                <div class="mb-4">
                    <label class="form-label">Mot de passe</label>
                    {{ form.password }}
                </div>
                <button type="submit" class="btn btn-herbic w-100 py-2" style="font-size:1rem;">
                    Se connecter <i class="bi bi-arrow-right ms-1"></i>
                </button>
            </form>
        </div>
    </div>
</body>
</html>
